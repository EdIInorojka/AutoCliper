# StreamCuter - Example Configuration
# Copy this file and edit paths/settings as needed.

# Input: local file path or URL (YouTube/Kick VOD)
input: ""
input_start_sec:
input_end_sec:

# Directories
output_dir: "output"
temp_dir: "temp"

# Language for ASR: auto | ru | en
language: "auto"

# Subtitles
subtitles_enabled: true
subtitles_mode: "word_by_word"
subtitles_position: "between_webcam_and_game"
subtitles_theme: "red"
subtitles_max_words_per_group: 1
subtitles_font_name: "Arial Black"
subtitles_font_path: "fonts/subtitles.ttf"
subtitles_template_ru: "subtitles/ru.ass"
subtitles_template_en: "subtitles/en.ass"
subtitles_between_y_ratio: 0.42
whisper_model_cache_dir: "models/whisper"

# Webcam detection
layout_mode: "auto" # auto | slot_only | cinema
webcam_detection: "auto"
webcam_edge_margin_ratio: 0.15
# Optional manual fallback crops: [x, y, width, height] in source-video pixels.
manual_webcam_crop:
manual_slot_crop:
layout_preview_enabled: false
layout_preview_time_sec:
layout_preview_autofill: true
layout_debug_preview: "layout_debug_preview.jpg"
layout_preview_save_path: "layout_selection.json"
layout_annotation_dataset_enabled: true
layout_annotation_dataset_path: "layout_dataset/annotations.jsonl"
webcam_top_ratio: 0.33
content_bottom_ratio: 0.67

# Highlights
highlight_target_count_per_hour: 15
min_clip_duration_sec: 20
preferred_clip_duration_sec: 45
max_clip_duration_sec: 60
hard_max_clip_duration_sec: 75

# CTA Pause Effect
cta:
  enabled: true
  trigger_range_sec: [7.0, 10.0]
  freeze_duration_sec: 4.0
  grayscale_strength: 1.0
  text_mode: "file"  # file | custom | variants
  text: "THE GAME IN BIO"
  text_en: "THE GAME IN BIO"
  text_ru: "ИГРА В ОПИСАНИИ"
  custom_text:
  text_file_path: ""
  text_file_path_en: "cta_texts/en.txt"
  text_file_path_ru: "cta_texts/ru.txt"
  language: "auto"
  font_name: "Impact"
  font_path: "fonts/cta.ttf"
  font_size: 78
  min_font_size: 34
  max_text_width_ratio: 0.86
  max_text_lines: 3
  font_color: "0xFFD200"
  border_color: "black"
  shadow_color: "red@0.85"
  typewriter_enabled: true
  typewriter_speed: 0.16
  voice_mp3_path: "sounds/voice/cta.mp3"

# Background Music
music:
  enabled: false
  folder: "sounds/music"
  volume_min: 0.10
  volume_max: 0.20
  duck_under_speech: true

# Persistent caches for expensive analysis
cache:
  enabled: true
  dir: "cache"
  asr: true
  highlights: true
  layout: true

# Cleanup
cleanup_temp_files: true
delete_input_after_success: false
render_resume_enabled: true
highlight_report_path: "highlight_report.json"

# Export settings
export:
  render_preset: "quality"  # fast | balanced | quality | small | nvenc_fast | custom
  width: 1080
  height: 1920
  fps: 30
  codec: "libx264"
  bitrate: "8M"
  crf: 22
  preset: "slow"
  audio_codec: "aac"
  audio_bitrate: "192k"

# Variation / Randomization
variation:
  enabled: true
  intro_trim_randomization: 1.5
  clip_duration_variation: true
  clip_duration_step_min_sec: 2.0
  clip_duration_step_max_sec: 4.0
  clip_duration_max_same_sec: 2
  cta_time_randomization: true
  slight_zoom_variants: 0.05
  subtitle_style_variants: true
  bgm_random_pick: true
  cta_text_variants:
    - "THE GAME IN BIO"
    - "BIO FOR MORE"
    - "CHECK BIO"
    - "MORE IN BIO"
  cta_text_variants_ru:
    - "ИГРА В ОПИСАНИИ"
    - "ССЫЛКА В ОПИСАНИИ"

# Bot preset fields (for future Telegram integration)
bot_preset_fields:
  available_themes:
    - "red"
    - "purple"
    - "black"
    - "yellow"
  available_cta_texts:
    - "THE GAME IN BIO"
    - "BIO FOR MORE"
    - "CHECK BIO"
    - "MORE IN BIO"
  available_cta_texts_ru:
    - "ИГРА В ОПИСАНИИ"
    - "ССЫЛКА В ОПИСАНИИ"

  available_languages:
    - "auto"
    - "ru"
    - "en"

# Debug mode
debug: false


